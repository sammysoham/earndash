  crypto: ^3.0.6
  google_mobile_ads: ^6.0.0
  pedometer: ^4.1.1
  flutter_activity_recognition: ^3.1.0
  health: ^13.1.4
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.3.0
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
