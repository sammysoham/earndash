services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: earndash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 3000
      FRONTEND_URL: http://localhost:8080
      JWT_SECRET: super-secret
      JWT_EXPIRES_IN: 7d
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: earndash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DB_SYNC: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'

  flutter_web:
    build:
      context: .
      dockerfile: apps/flutter_app/Dockerfile
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres_data:
